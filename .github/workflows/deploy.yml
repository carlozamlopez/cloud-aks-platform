name: Cloud-AKS Platform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: acrcloudaksdevmx
  AKS_CLUSTER: aks-cloudaks-dev
  RESOURCE_GROUP: rg-cloudaks-dev

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Format Check
      run: terraform fmt -check
      working-directory: ./infra
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login ACR
      run: az acr login --name ${{ env.ACR_NAME }}

    - name: Build and Push Docker image
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/cloud-aks-platform:${{ github.sha }} ./app
        docker push ${{ env.ACR_NAME }}.azurecr.io/cloud-aks-platform:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get AKS credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ env.RESOURCE_GROUP }} \
          --name ${{ env.AKS_CLUSTER }}

    - name: Deploy to AKS
      run: |
        kubectl set image deployment/cloud-aks-dashboard \
          dashboard=${{ env.ACR_NAME }}.azurecr.io/cloud-aks-platform:${{ github.sha }} \
          -n produccion
        kubectl rollout status deployment/cloud-aks-dashboard -n produccion