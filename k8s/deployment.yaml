apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-aks-dashboard
  namespace: produccion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-aks-dashboard
  template:
    metadata:
      labels:
        app: cloud-aks-dashboard
    spec:
      containers:
      - name: dashboard
        image: acrcloudaksdevmx.azurecr.io/cloud-aks-platform:v1.0.0
        ports:
        - containerPort: 5000
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30